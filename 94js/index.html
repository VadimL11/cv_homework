<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulation Homework</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <style>
        .page-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 15px;
        }

        .custom-image {
            width: min(300px, 100%);
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            transition: all 0.3s ease;
        }

        .image-rounded {
            border-radius: 20px;
            border: 4px solid #0d6efd;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.25);
        }

        .image-circle {
            border-radius: 50%;
            border: 4px solid #6c757d;
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.25);
            transform: scale(0.95);
        }

        @media (max-width: 576px) {
            #mainTitle {
                font-size: 2rem;
            }

            #descriptionText {
                font-size: 1.1rem !important;
            }

            .custom-image {
                width: min(220px, 100%);
            }
        }
    </style>
</head>
<body class="bg-light">
<div class="container page-container">
    <h1 id="mainTitle" class="mb-4">Ласкаво просимо до світу DOM-маніпуляцій!</h1>

    <button id="changeTitleBtn" class="btn btn-primary mb-4">
        Змінити заголовок
    </button>

    <div class="mb-3">
        <img
                id="mainImage"
                class="custom-image image-rounded"
                src="dom-image.jpg"
                alt="Зображення для демонстрації DOM-маніпуляцій"
        />
    </div>

    <button id="toggleImageStyleBtn" class="btn btn-secondary mb-4">
        Перемкнути стиль зображення
    </button>

    <p id="descriptionText" class="fs-4 mb-4">
        DOM дозволяє JavaScript змінювати структуру, текст, стилі та поведінку елементів сторінки в реальному часі.
    </p>

    <button id="updateDescriptionBtn" class="btn btn-success">
        Оновити опис
    </button>
</div>

<script>
    const mainTitle = document.getElementById("mainTitle");
    const changeTitleBtn = document.getElementById("changeTitleBtn");

    const mainImage = document.getElementById("mainImage");
    const toggleImageStyleBtn = document.getElementById("toggleImageStyleBtn");

    const descriptionText = document.getElementById("descriptionText");
    const updateDescriptionBtn = document.getElementById("updateDescriptionBtn");

    const originalTitle = "Ласкаво просимо до світу DOM-маніпуляцій!";
    const newTitle = "JavaScript робить сторінку інтерактивною через DOM!";

    const originalDescription =
        "DOM дозволяє JavaScript змінювати структуру, текст, стилі та поведінку елементів сторінки в реальному часі.";

    const newDescription =
        "За допомогою DOM можна знаходити елементи HTML, змінювати їхній текст, стилі, атрибути та створювати інтерактивну взаємодію з користувачем.";

    let isRounded = true;

    changeTitleBtn.addEventListener("click", function () {
        if (mainTitle.textContent === originalTitle) {
            mainTitle.textContent = newTitle;
        } else {
            mainTitle.textContent = originalTitle;
        }
    });

    toggleImageStyleBtn.addEventListener("click", function () {
        if (isRounded) {
            mainImage.classList.remove("image-rounded");
            mainImage.classList.add("image-circle");
        } else {
            mainImage.classList.remove("image-circle");
            mainImage.classList.add("image-rounded");
        }

        isRounded = !isRounded;
    });

    updateDescriptionBtn.addEventListener("click", function () {
        if (descriptionText.textContent === originalDescription) {
            descriptionText.textContent = newDescription;
        } else {
            descriptionText.textContent = originalDescription;
        }
    });
</script>
</body>
</html>
